spring.application.name=api
# ==========================================
# 1. CONEXI”N A POSTGRESQL (Relacional)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/tap2eat_db
spring.datasource.username=admin
spring.datasource.password=password123
# Esto hace que Java cree las tablas autom·ticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 2. CONEXI”N A MONGODB (Documentos)
# ==========================================
spring.data.mongodb.uri=mongodb://admin:password123@localhost:27017/tap2eat_mongo?authSource=admin

# ==========================================
# 3. CONEXI”N A NEO4J (Grafos)
# ==========================================
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password123
